<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Halı Saha Pro Menajer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="container">
        <h1>Halı Saha Kadro Oluşturucu</h1>
<span style="display: block; font-size: 13px; color: #aaaaaa; font-style: italic; margin-top: -8px; margin-bottom: 15px; letter-spacing: 0.5px;">
    Created by Erhan Ersoy
</span>
        
        <div class="match-mode-container">
            <h3>Maç Modu Seçin</h3>
            <div class="radio-group">
                <label><input type="radio" name="matchMode" value="6v6" onchange="modDegisti()"> 6'ya 6 Maç (12 Kişi - Taktik: 2-2-1)</label>
                <label><input type="radio" name="matchMode" value="7v7" checked onchange="modDegisti()"> 7'ye 7 Maç (14 Kişi - Taktik: 3-2-1)</label>
            </div>
        </div>

        <div class="player-form-container">
            <h3>Yeni Oyuncu Kayıt (FIFA Tarzı)</h3>
            <div class="form-row">
                <input type="text" id="playerName" placeholder="Oyuncu Adı">
                <select id="playerRole">
                    <option value="KL">Kaleci</option>
                    <option value="DEF">Defans</option>
                    <option value="ORT">Orta Saha</option>
                    <option value="HUC">Forvet / Hücum</option>
                </select>
            </div>
            <div class="skills-row">
                <label>KL: <input type="number" id="skillKL" value="50" min="1" max="99"></label>
                <label>DEF: <input type="number" id="skillDEF" value="50" min="1" max="99"></label>
                <label>ORT: <input type="number" id="skillORT" value="50" min="1" max="99"></label>
                <label>HUC: <input type="number" id="skillHUC" value="50" min="1" max="99"></label>
            </div>
            <button onclick="oyuncuEkle()" class="add-btn">Havuza Yeni Oyuncu Ekle</button>
        </div>

        <div class="player-list-section">
            <h3 id="listHeader">Oyuncu Havuzu (Maç için 14 kişi seçin)</h3>
            <div id="playerList" class="player-list">
                </div>
                <div style="display: flex; gap: 12px; margin-top: 15px; margin-bottom: 25px; width: 100%;">
    
                    <button onclick="takimlariKur()" style="flex: 1; padding: 12px; font-weight: bold; background-color: #ff5555; color: white; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: opacity 0.2s;">
                        🤖 Otomatik Takım Kur
                    </button>
                    
                    <button onclick="manuelKadroButonTetikle()" style="flex: 1; padding: 12px; font-weight: bold; background-color: #ffcc00; color: #000000; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; transition: opacity 0.2s;">
                        ✏️ Manuel Takım Kur
                    </button>
                
                </div>
        </div>

        <div class="pitch-container">
            <div class="pitch">
                <div class="center-line"></div>
                <div class="center-circle"></div>
                
                <div class="penalty-arc-top"></div>
                <div class="penalty-arc-bottom"></div>

                <div class="penalty-box top"></div>
                <div class="goal-area top"></div>
                
                <div class="penalty-box bottom"></div>
                <div class="goal-area bottom"></div>
                
                <div id="redTeamPitch" class="team-pitch-area"></div>
                <div id="whiteTeamPitch" class="team-pitch-area"></div>
            </div>
        </div>
    </div>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-database-compat.js"></script>
    <script src="app.js"></script>
</body>
</html>
